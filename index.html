<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechCorp - Interface Phi-3.5</title>
    <!-- Chargement de VueJS 3 via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #eef2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        #app {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background-color: #1e293b;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 1.4rem;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #4ade80;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }
        .chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: #f8fafc;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.assistant {
            align-self: flex-start;
        }
        .message-sender {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 4px;
            margin-left: 4px;
        }
        .message.user .message-sender {
            text-align: right;
            margin-right: 4px;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.user .bubble {
            background-color: #2563eb;
            color: white;
            border-bottom-right-radius: 2px;
        }
        .message.assistant .bubble {
            background-color: #e2e8f0;
            color: #1e293b;
            border-bottom-left-radius: 2px;
        }
        .loading {
            align-self: flex-start;
            color: #64748b;
            font-style: italic;
            font-size: 0.9rem;
            padding: 10px;
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
        }
        input {
            flex-grow: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #2563eb;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover:not(:disabled) {
            background-color: #1d4ed8;
        }
        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="app">
        <header class="header">
            <h1>🤖 TechCorp - Phi-3.5</h1>
            <div class="status">
                <div class="status-dot"></div>
                Connecté (Local)
            </div>
        </header>
        
        <div class="chat-box" id="chatBox">
            <div v-for="(msg, index) in messages" :key="index" :class="['message', msg.role]">
                <div class="message-sender">{{ msg.role === 'user' ? 'Vous' : 'Phi-3.5-Financial' }}</div>
                <div class="bubble">{{ msg.text }}</div>
            </div>
            <div v-if="isLoading" class="loading">
                L'IA analyse votre demande...
            </div>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                v-model="userInput" 
                @keyup.enter="sendMessage" 
                placeholder="Posez votre question financière..." 
                :disabled="isLoading"
            >
            <button @click="sendMessage" :disabled="isLoading || !userInput.trim()">Envoyer</button>
        </div>
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue;

        createApp({
            setup() {
                // Par défaut, cible Ollama en local. À changer si ton équipe INFRA utilise Triton (ex: http://localhost:8000)
                const API_URL = 'http://localhost:11434/api/generate'; 
                const MODEL_NAME = 'phi3.5'; 

                const messages = ref([
                    { role: 'assistant', text: 'Bonjour ! Interface d\'inférence initialisée. Comment puis-je vous aider ?' }
                ]);
                const userInput = ref('');
                const isLoading = ref(false);

                const scrollToBottom = () => {
                    nextTick(() => {
                        const chatBox = document.getElementById('chatBox');
                        chatBox.scrollTop = chatBox.scrollHeight;
                    });
                };

                const sendMessage = async () => {
                    if (!userInput.value.trim() || isLoading.value) return;

                    const text = userInput.value.trim();
                    messages.value.push({ role: 'user', text });
                    userInput.value = '';
                    isLoading.value = true;
                    scrollToBottom();

                    try {
                        const response = await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                model: MODEL_NAME,
                                prompt: text,
                                stream: false
                            })
                        });

                        if (!response.ok) throw new Error('Erreur réseau');

                        const data = await response.json();
                        messages.value.push({ role: 'assistant', text: data.response });
                        
                    } catch (error) {
                        messages.value.push({ role: 'assistant', text: '⚠️ Erreur : Impossible de joindre le modèle. Demandez à l\'équipe INFRA de vérifier que le serveur tourne (ex: "ollama run phi3.5") et que les CORS sont activés (OLLAMA_ORIGINS="*").' });
                    } finally {
                        isLoading.value = false;
                        scrollToBottom();
                    }
                };

                return {
                    messages,
                    userInput,
                    isLoading,
                    sendMessage
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
