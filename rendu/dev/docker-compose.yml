version: '3.8'

services:
  # Service Flask - L'API proxy et le frontend
  api:
    build: .
    container_name: phi-api
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://localhost:11434}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-phi3.5}
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
    volumes:
      - ./index.html:/app/index.html:ro
    networks:
      - phi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  phi-network:
    driver: bridge
