---
###############################################################################
# Ollama Role - Tasks
# Purpose: Install and configure Ollama with Phi-3.5-Financial model
###############################################################################

- name: "Check prerequisites"
  block:
    - name: "Check if Docker is installed"
      command: "docker --version"
      register: docker_check
      changed_when: false
      failed_when: docker_check.rc != 0

    - name: "Check if Docker Compose is installed"
      command: "docker-compose --version"
      register: docker_compose_check
      changed_when: false
      failed_when: docker_compose_check.rc != 0

    - name: "Display Docker versions"
      debug:
        msg: |
          Docker: {{ docker_check.stdout }}
          Docker Compose: {{ docker_compose_check.stdout }}

  rescue:
    - name: "Display Docker installation instructions"
      debug:
        msg: |
          ❌ Docker or Docker Compose not found

          Installation:
          1. Install Docker: https://docs.docker.com/get-docker/
          2. Install Docker Compose: https://docs.docker.com/compose/install/

          After installation, run this playbook again
      failed: yes

- name: "Ensure project directory exists"
  file:
    path: "{{ project_dir }}"
    state: directory
    mode: '0755'

- name: "Copy deployment files"
  block:
    - name: "Copy Modelfile"
      copy:
        src: "{{ playbook_dir }}/../Modelfile"
        dest: "{{ project_dir }}/Modelfile"
        mode: '0644'

    - name: "Copy Dockerfile"
      copy:
        src: "{{ playbook_dir }}/../Dockerfile"
        dest: "{{ project_dir }}/Dockerfile"
        mode: '0644'

    - name: "Copy docker-compose.yml"
      copy:
        src: "{{ playbook_dir }}/../docker-compose.yml"
        dest: "{{ project_dir }}/docker-compose.yml"
        mode: '0644'

    - name: "Copy init-model.sh"
      copy:
        src: "{{ playbook_dir }}/../init-model.sh"
        dest: "{{ project_dir }}/init-model.sh"
        mode: '0755'

  rescue:
    - name: "Display error about missing files"
      debug:
        msg: |
          ❌ Could not copy deployment files

          Make sure the following files exist in the infra directory:
          - Modelfile
          - Dockerfile
          - docker-compose.yml
          - init-model.sh
      failed: yes

- name: "Create Docker network"
  community.docker.docker_network:
    name: "phi-financial"
    driver: "bridge"
    state: present
  ignore_errors: yes

- name: "Create Docker volume"
  community.docker.docker_volume:
    name: "{{ volume_name }}"
    driver: "{{ volume_driver }}"
    state: present
  ignore_errors: yes

- name: "Build Docker image"
  community.docker.docker_image:
    name: "{{ project_name }}"
    tag: "latest"
    source: build
    build:
      path: "{{ project_dir }}"
      dockerfile: "Dockerfile"
    state: present
    force_source: no
  register: docker_build

- name: "Stop existing container (if any)"
  community.docker.docker_container:
    name: "{{ docker_container_name }}"
    state: absent
  ignore_errors: yes

- name: "Start Ollama container"
  community.docker.docker_container:
    name: "{{ docker_container_name }}"
    image: "{{ project_name }}:latest"
    state: started
    restart_policy: "unless-stopped"
    ports:
      - "{{ api_port }}:{{ api_port }}"
    volumes:
      - "{{ volume_name }}:/root/.ollama"
      - "{{ project_dir }}/Modelfile:/tmp/Modelfile:ro"
      - "{{ project_dir }}/init-model.sh:/usr/local/bin/init-model.sh:ro"
    networks:
      - name: "phi-financial"
    env:
      OLLAMA_HOST: "{{ api_host }}:{{ api_port }}"
      OLLAMA_NUM_PARALLEL: "4"
      OLLAMA_NUM_THREAD: "8"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:{{ api_port }}/api/tags"]
      interval: 30
      timeout: 10
      retries: 3
      start_period: 60
    log_driver: "json-file"
    log_options:
      max-size: "10m"
      max-file: "3"
  register: container_start

- name: "Wait for API to be ready"
  uri:
    url: "{{ api_url }}/api/tags"
    method: GET
    status_code: 200
  register: api_ready
  until: api_ready.status == 200
  retries: 30
  delay: 2
  ignore_errors: yes

- name: "Initialize model in container"
  community.docker.docker_container_exec:
    container: "{{ docker_container_name }}"
    command: "/usr/local/bin/init-model.sh"
  register: model_init
  ignore_errors: yes

- name: "Display model initialization output"
  debug:
    msg: "{{ model_init.stdout_lines }}"
  when: model_init.stdout_lines is defined

- name: "Verify model is available"
  uri:
    url: "{{ api_url }}/api/tags"
    method: GET
  register: model_check
  until: model_check.status == 200 and (model_check.json.models is defined)
  retries: 10
  delay: 2
  ignore_errors: yes

- name: "Test API inference"
  uri:
    url: "{{ api_url }}/api/generate"
    method: POST
    body_format: json
    body:
      model: "{{ model_name }}"
      prompt: "What is finance?"
      stream: false
    timeout: 120
  register: api_test
  ignore_errors: yes
  retries: 3
  delay: 5

- name: "Display API test result"
  debug:
    msg: "✓ API test successful - Model is responding"
  when: api_test.status == 200

- name: "Create health check script"
  copy:
    content: |
      #!/bin/bash
      curl -s {{ api_url }}/api/tags | jq . || echo "API not responding"
    dest: "{{ project_dir }}/health-check.sh"
    mode: '0755'

- name: "Create test script"
  copy:
    content: |
      #!/bin/bash
      curl -s -X POST {{ api_url }}/api/generate \
        -H "Content-Type: application/json" \
        -d '{
          "model": "{{ model_name }}",
          "prompt": "What is investment?",
          "stream": false
        }' | jq .response -r
    dest: "{{ project_dir }}/test-api.sh"
    mode: '0755'
